<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PWA アイコン生成ツール</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 720px; margin: 32px auto; padding: 0 16px; background: #f5f7fb; color: #222; }
  h1 { font-size: 1.4rem; }
  p { line-height: 1.6; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; margin: 20px 0; }
  .card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
  canvas { display: block; border-radius: 8px; margin: 0 auto 12px; }
  button { padding: 10px 16px; border: none; border-radius: 8px; background: #007aff; color: #fff; font-weight: 600; cursor: pointer; }
  button:hover { background: #005bb5; }
  code { background: #eef1f6; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
</style>
</head>
<body>
<h1>📱 PWA アイコン生成ツール</h1>
<p>下の3つのボタンを順に押して、ダウンロードされたPNGを <code>engTest/icons/</code> フォルダに保存してください。</p>
<p>保存名は必ず以下にしてください：</p>
<ul>
  <li><code>icon-192.png</code>（192×192）</li>
  <li><code>icon-512.png</code>（512×512）</li>
  <li><code>icon-maskable-512.png</code>（512×512 マスカブル）</li>
</ul>

<div class="row" id="cards"></div>

<script>
function drawIcon(ctx, size, maskable) {
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#007aff');
  grad.addColorStop(1, '#5856d6');

  if (maskable) {
    // full-bleed background for safe area
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  } else {
    const r = size * 0.1875; // rounded corners like iOS
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.arcTo(size, 0, size, size, r);
    ctx.arcTo(size, size, 0, size, r);
    ctx.arcTo(0, size, 0, 0, r);
    ctx.arcTo(0, 0, size, 0, r);
    ctx.closePath();
    ctx.fill();
  }

  // Centered "英" text (shrink for maskable safe zone)
  const scale = maskable ? 0.55 : 0.65;
  ctx.fillStyle = '#ffffff';
  ctx.font = `800 ${Math.floor(size * scale)}px -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('英', size / 2, size * 0.53);
}

function makeCard(label, size, maskable, filename) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  c.style.width = '120px'; c.style.height = '120px';
  drawIcon(c.getContext('2d'), size, maskable);
  const btn = document.createElement('button');
  btn.textContent = `⬇ ${filename} をダウンロード`;
  btn.onclick = () => {
    c.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }, 'image/png');
  };
  const h = document.createElement('div');
  h.textContent = label;
  h.style.fontWeight = '600';
  h.style.marginBottom = '8px';
  wrap.append(h, c, btn);
  return wrap;
}

const cards = document.getElementById('cards');
cards.append(makeCard('192 通常', 192, false, 'icon-192.png'));
cards.append(makeCard('512 通常', 512, false, 'icon-512.png'));
cards.append(makeCard('512 マスカブル', 512, true, 'icon-maskable-512.png'));
</script>
</body>
</html>
